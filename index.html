<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banríon — Financial Advisor Platform</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Top Navigation Bar -->
  <header class="top-nav">
    <div class="nav-left">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 64 64" fill="none">
          <!-- Top heart (petal) -->
          <path d="M32 28 C32 28 32 20 32 16 C32 10 28 6 24 6 C20 6 16 10 16 16 C16 22 32 28 32 28Z" stroke="#0C6B3A" stroke-width="2.5" fill="none"/>
          <path d="M32 28 C32 28 32 20 32 16 C32 10 36 6 40 6 C44 6 48 10 48 16 C48 22 32 28 32 28Z" stroke="#0C6B3A" stroke-width="2.5" fill="none"/>
          <!-- Bottom heart (petal) -->
          <path d="M32 36 C32 36 32 44 32 48 C32 54 28 58 24 58 C20 58 16 54 16 48 C16 42 32 36 32 36Z" stroke="#0C6B3A" stroke-width="2.5" fill="none"/>
          <path d="M32 36 C32 36 32 44 32 48 C32 54 36 58 40 58 C44 58 48 54 48 48 C48 42 32 36 32 36Z" stroke="#0C6B3A" stroke-width="2.5" fill="none"/>
          <!-- Left heart (petal) -->
          <path d="M28 32 C28 32 20 32 16 32 C10 32 6 28 6 24 C6 20 10 16 16 16 C22 16 28 32 28 32Z" stroke="#0C6B3A" stroke-width="2.5" fill="none"/>
          <path d="M28 32 C28 32 20 32 16 32 C10 32 6 36 6 40 C6 44 10 48 16 48 C22 48 28 32 28 32Z" stroke="#0C6B3A" stroke-width="2.5" fill="none"/>
          <!-- Right heart (petal) -->
          <path d="M36 32 C36 32 44 32 48 32 C54 32 58 28 58 24 C58 20 54 16 48 16 C42 16 36 32 36 32Z" stroke="#0C6B3A" stroke-width="2.5" fill="none"/>
          <path d="M36 32 C36 32 44 32 48 32 C54 32 58 36 58 40 C58 44 54 48 48 48 C42 48 36 32 36 32Z" stroke="#0C6B3A" stroke-width="2.5" fill="none"/>
        </svg>
        <span class="logo-text">Banríon</span>
      </div>
    </div>
    <nav class="nav-center">
      <button class="nav-tab active" data-view="feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Feed</span>
      </button>
      <button class="nav-tab" data-view="managers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Managers</span>
      </button>
      <button class="nav-tab" data-view="subscriptions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span>Subscriptions</span>
      </button>
    </nav>
    <div class="nav-right">
      <div class="user-avatar" id="currentUserAvatar">JD</div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="main-content">

    <!-- ==================== FEED VIEW ==================== -->
    <section class="view active" id="view-feed">
      <div class="feed-container">
        <!-- Post Composer -->
        <div class="post-composer">
          <div class="composer-header">
            <div class="user-avatar small">JD</div>
            <textarea id="postInput" placeholder="Share research, news, or insights..." rows="3"></textarea>
          </div>
          <div class="composer-actions">
            <div class="composer-tools">
              <button class="tool-btn" id="attachFileBtn" title="Attach file">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <button class="tool-btn" id="attachChartBtn" title="Add chart reference">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              </button>
              <select id="postCategory" class="category-select">
                <option value="general">General</option>
                <option value="research">Research</option>
                <option value="market-news">Market News</option>
                <option value="analysis">Analysis</option>
                <option value="regulatory">Regulatory</option>
              </select>
            </div>
            <button class="btn btn-primary" id="publishPostBtn">Post</button>
          </div>
        </div>

        <!-- Feed Filters -->
        <div class="feed-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="research">Research</button>
          <button class="filter-btn" data-filter="market-news">Market News</button>
          <button class="filter-btn" data-filter="analysis">Analysis</button>
          <button class="filter-btn" data-filter="regulatory">Regulatory</button>
        </div>

        <!-- Feed Posts -->
        <div id="feedPosts" class="feed-posts">
          <!-- Posts are rendered by JS -->
        </div>
      </div>
    </section>

    <!-- ==================== MANAGERS VIEW ==================== -->
    <section class="view" id="view-managers">
      <div class="managers-container">
        <div class="managers-header">
          <h1>Investment Managers</h1>
          <div class="search-bar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="managerSearch" placeholder="Search managers...">
          </div>
        </div>
        <div class="manager-categories">
          <button class="category-btn active" data-category="all">All</button>
          <button class="category-btn" data-category="equity">Equity</button>
          <button class="category-btn" data-category="fixed-income">Fixed Income</button>
          <button class="category-btn" data-category="alternatives">Alternatives</button>
          <button class="category-btn" data-category="multi-asset">Multi-Asset</button>
          <button class="category-btn" data-category="esg">ESG</button>
        </div>
        <div id="managerGrid" class="manager-grid">
          <!-- Manager icons rendered by JS -->
        </div>
      </div>
    </section>

    <!-- ==================== SUBSCRIPTIONS VIEW ==================== -->
    <section class="view" id="view-subscriptions">
      <div class="subscriptions-container">
        <h1>Your Subscriptions</h1>
        <p class="sub-description">Managers you follow. Their posts appear in your news feed.</p>
        <div id="subscriptionsList" class="subscriptions-list">
          <!-- Rendered by JS -->
        </div>
      </div>
    </section>

    <!-- ==================== DATA ROOM VIEW ==================== -->
    <section class="view" id="view-dataroom">
      <div class="dataroom-container">
        <div class="dataroom-header">
          <button class="btn btn-ghost" id="backToManagers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Managers
          </button>
          <div class="dataroom-title">
            <div class="dataroom-manager-icon" id="dataroomManagerIcon"></div>
            <div>
              <h1 id="dataroomManagerName">Manager Name</h1>
              <p id="dataroomManagerDesc" class="dataroom-subtitle">Description</p>
            </div>
          </div>
          <button class="btn btn-primary" id="dataroomSubscribeBtn">Subscribe</button>
        </div>

        <div class="dataroom-body">
          <!-- File Tree Sidebar -->
          <aside class="file-tree-sidebar">
            <div class="file-tree-header">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              <span>Documents</span>
            </div>
            <div id="fileTree" class="file-tree">
              <!-- Rendered by JS -->
            </div>
          </aside>

          <!-- Document Preview -->
          <div class="document-preview">
            <div id="documentContent" class="document-content">
              <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <h3>Select a document</h3>
                <p>Choose a file from the tree to preview its contents.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
